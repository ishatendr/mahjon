<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🀄 麻雀成績管理</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --green: #1a6b3c;
    --green-light: #2d8a54;
    --green-dark: #0f4526;
    --gold: #e8b84b;
    --gold-light: #f5d07a;
    --red: #c0392b;
    --blue: #2980b9;
    --bg: #0d2b1a;
    --bg2: #142d1e;
    --bg3: #1e3d2a;
    --card: #1a3d28;
    --card2: #204832;
    --border: #2a5c38;
    --text: #e8f5e3;
    --text2: #a8c8a0;
    --text3: #6a9a72;
    --win: #4caf50;
    --lose: #ef5350;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Helvetica Neue', 'Hiragino Sans', 'Yu Gothic', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ===== HEADER ===== */
  .header {
    background: linear-gradient(135deg, var(--green-dark) 0%, var(--green) 100%);
    border-bottom: 3px solid var(--gold);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }

  .header-left h1 {
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 2px;
  }

  .header-left p {
    font-size: 0.78rem;
    color: var(--text2);
    margin-top: 2px;
  }

  .header-total {
    text-align: right;
  }

  .header-total .label {
    font-size: 0.72rem;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .header-total .amount {
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--win);
  }

  .header-total .amount.negative { color: var(--lose); }

  /* ===== NAV TABS ===== */
  .nav {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 0;
    padding: 0 24px;
    overflow-x: auto;
  }

  .nav button {
    background: none;
    border: none;
    color: var(--text3);
    font-size: 0.85rem;
    padding: 14px 20px;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    white-space: nowrap;
    transition: all 0.2s;
    font-family: inherit;
    letter-spacing: 0.5px;
  }

  .nav button:hover { color: var(--text); background: var(--bg3); }
  .nav button.active { color: var(--gold); border-bottom-color: var(--gold); }

  /* ===== MAIN ===== */
  .main { padding: 24px 28px; max-width: 1400px; margin: 0 auto; }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ===== STAT CARDS ===== */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    transition: transform 0.15s;
  }

  .stat-card:hover { transform: translateY(-2px); }

  .stat-card .label {
    font-size: 0.72rem;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .stat-card .value {
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--text);
  }

  .stat-card .value.win { color: var(--win); }
  .stat-card .value.lose { color: var(--lose); }
  .stat-card .value.gold { color: var(--gold); }

  .stat-card .sub {
    font-size: 0.72rem;
    color: var(--text3);
    margin-top: 4px;
  }

  /* ===== CHART CARDS ===== */
  .chart-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
  }

  .chart-card h3 {
    font-size: 0.9rem;
    color: var(--text2);
    margin-bottom: 16px;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-left: 3px solid var(--gold);
    padding-left: 10px;
  }

  .chart-wrap { position: relative; }

  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  @media (max-width: 768px) { .two-col { grid-template-columns: 1fr; } }

  /* ===== FILTERS ===== */
  .filters {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: flex-end;
  }

  .filter-group label {
    display: block;
    font-size: 0.7rem;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 5px;
  }

  .filter-group input,
  .filter-group select {
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 12px;
    border-radius: 7px;
    font-size: 0.82rem;
    font-family: inherit;
    min-width: 130px;
    outline: none;
    transition: border-color 0.2s;
  }

  .filter-group input:focus,
  .filter-group select:focus { border-color: var(--gold); }

  .filter-group select option { background: var(--bg2); }

  .filter-btn {
    background: var(--green);
    border: none;
    color: white;
    padding: 8px 16px;
    border-radius: 7px;
    font-size: 0.82rem;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.2s;
  }

  .filter-btn:hover { background: var(--green-light); }

  .filter-btn.reset {
    background: var(--bg3);
    border: 1px solid var(--border);
  }

  /* ===== TABLE ===== */
  .table-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .table-header {
    padding: 14px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
  }

  .table-header h3 {
    font-size: 0.85rem;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .record-count {
    font-size: 0.78rem;
    color: var(--text3);
    background: var(--bg3);
    padding: 4px 10px;
    border-radius: 20px;
  }

  .table-scroll { overflow-x: auto; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.83rem;
  }

  thead th {
    background: var(--bg2);
    color: var(--text3);
    padding: 10px 14px;
    text-align: left;
    font-weight: 600;
    font-size: 0.73rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    transition: color 0.2s;
  }

  thead th:hover { color: var(--gold); }
  thead th.sorted { color: var(--gold); }

  thead th .sort-icon { opacity: 0.4; margin-left: 4px; }
  thead th.sorted .sort-icon { opacity: 1; }

  tbody tr {
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 0.1s;
  }

  tbody tr:hover { background: var(--card2); }

  tbody td {
    padding: 9px 14px;
    color: var(--text2);
    white-space: nowrap;
  }

  .td-profit { font-weight: 600; }
  .td-profit.positive { color: var(--win); }
  .td-profit.negative { color: var(--lose); }

  .td-cumulative { font-weight: 500; }
  .td-cumulative.positive { color: #81c784; }
  .td-cumulative.negative { color: #ef9a9a; }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 0.72rem;
    font-weight: 600;
  }

  .badge-3a { background: rgba(76,175,80,0.2); color: #81c784; }
  .badge-4a { background: rgba(33,150,243,0.2); color: #64b5f6; }
  .badge-3b { background: rgba(76,175,80,0.15); color: #a5d6a7; }
  .badge-4b { background: rgba(33,150,243,0.15); color: #90caf9; }
  .badge-other { background: rgba(158,158,158,0.2); color: #bdbdbd; }
  .badge-pin { background: rgba(255,193,7,0.2); color: #ffd54f; }
  .badge-2 { background: rgba(156,39,176,0.2); color: #ce93d8; }

  .notes-cell {
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text3);
    font-size: 0.78rem;
  }

  /* ===== PAGINATION ===== */
  .pagination {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    padding: 16px;
    border-top: 1px solid var(--border);
  }

  .page-btn {
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.8rem;
    transition: all 0.15s;
    font-family: inherit;
  }

  .page-btn:hover { border-color: var(--gold); color: var(--gold); }
  .page-btn.active { background: var(--green); border-color: var(--green); color: white; }
  .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ===== BREAKDOWN TABLE ===== */
  .breakdown-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-top: 20px;
  }

  @media (max-width: 768px) { .breakdown-grid { grid-template-columns: 1fr; } }

  .breakdown-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .breakdown-card h3 {
    font-size: 0.82rem;
    color: var(--text2);
    padding: 14px 18px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .breakdown-table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }

  .breakdown-table th {
    padding: 8px 16px;
    font-size: 0.7rem;
    color: var(--text3);
    text-align: left;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    background: var(--bg3);
  }

  .breakdown-table td {
    padding: 9px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    color: var(--text2);
  }

  .breakdown-table tbody tr:hover { background: var(--card2); }

  .bar-bg {
    background: var(--bg2);
    border-radius: 4px;
    height: 6px;
    margin-top: 3px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 4px;
    background: var(--green-light);
    transition: width 0.3s;
  }

  .bar-fill.negative { background: var(--lose); }

  /* ===== MONTHLY ===== */
  .monthly-summary {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 12px;
    margin-top: 16px;
  }

  .month-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .month-card .month-label { font-size: 0.82rem; color: var(--text2); }
  .month-card .month-count { font-size: 0.72rem; color: var(--text3); }
  .month-card .month-profit { font-size: 1rem; font-weight: 700; }
  .month-card .month-profit.win { color: var(--win); }
  .month-card .month-profit.lose { color: var(--lose); }

  /* ===== YEAR FILTER ===== */
  .year-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
  }

  .year-tab {
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text3);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }

  .year-tab:hover, .year-tab.active {
    background: var(--green);
    border-color: var(--green);
    color: white;
  }

  /* ===== RECORD DETAIL MODAL ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 1000;
    justify-content: center;
    align-items: center;
  }

  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px;
    max-width: 480px;
    width: 90%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }

  .modal h3 {
    color: var(--gold);
    font-size: 1rem;
    margin-bottom: 18px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 12px;
  }

  .modal-row {
    display: flex;
    justify-content: space-between;
    padding: 7px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 0.85rem;
  }

  .modal-row .key { color: var(--text3); }
  .modal-row .val { color: var(--text); font-weight: 500; }

  .modal-close {
    margin-top: 18px;
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 9px;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.85rem;
  }

  .modal-close:hover { border-color: var(--gold); color: var(--gold); }

  /* ===== SCROLL BAR ===== */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--green); }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 600px) {
    .header { padding: 14px 16px; flex-wrap: wrap; gap: 10px; }
    .main { padding: 16px 12px; }
    .header-left h1 { font-size: 1.2rem; }
    .header-total .amount { font-size: 1.3rem; }
  }

  /* ===== INPUT FORM ===== */
  .input-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  @media (max-width: 768px) { .input-layout { grid-template-columns: 1fr; } }

  .form-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
  }

  .form-card h3 {
    font-size: 0.88rem;
    color: var(--text2);
    margin-bottom: 20px;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-left: 3px solid var(--gold);
    padding-left: 10px;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .form-group {
    margin-bottom: 14px;
  }

  .form-group label {
    display: block;
    font-size: 0.72rem;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .form-group label .required {
    color: var(--gold);
    margin-left: 3px;
  }

  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 13px;
    border-radius: 8px;
    font-size: 0.85rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 2px rgba(232,184,75,0.1);
  }

  .form-group select option { background: var(--bg2); }

  .form-group textarea { resize: vertical; min-height: 70px; }

  .form-preview {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    margin: 16px 0;
    font-size: 0.83rem;
  }

  .form-preview .pv-row {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    color: var(--text2);
  }

  .form-preview .pv-row .key { color: var(--text3); }
  .form-preview .pv-profit { font-size: 1.1rem; font-weight: 700; margin-top: 6px; }

  .submit-btn {
    width: 100%;
    background: var(--green);
    border: none;
    color: white;
    padding: 12px;
    border-radius: 9px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.5px;
    transition: background 0.2s;
  }

  .submit-btn:hover { background: var(--green-light); }

  .export-row {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .export-btn {
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 0.82rem;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .export-btn:hover { border-color: var(--gold); color: var(--gold); }

  .new-entries-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; margin-top: 10px; }
  .new-entries-table th {
    background: var(--bg2);
    color: var(--text3);
    padding: 8px 12px;
    text-align: left;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .new-entries-table td {
    padding: 9px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    color: var(--text2);
  }
  .new-entries-table tbody tr:hover { background: var(--card2); }

  .del-btn {
    background: none;
    border: 1px solid rgba(239,83,80,0.4);
    color: #ef5350;
    padding: 3px 9px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 0.75rem;
    font-family: inherit;
    transition: all 0.15s;
  }
  .del-btn:hover { background: rgba(239,83,80,0.15); }

  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--green);
    color: white;
    padding: 12px 24px;
    border-radius: 30px;
    font-size: 0.85rem;
    font-weight: 600;
    z-index: 2000;
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--lose); }

  .empty-state {
    text-align: center;
    padding: 30px;
    color: var(--text3);
    font-size: 0.85rem;
  }

</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>🀄 麻雀成績管理</h1>
    <p id="header-sub">データ読み込み中…</p>
  </div>
  <div class="header-total">
    <div class="label">累計収支</div>
    <div class="amount" id="header-total">¥0</div>
  </div>
</div>

<nav class="nav">
  <button onclick="showTab('dashboard')">📊 ダッシュボード</button>
  <button onclick="showTab('chart')">📈 グラフ</button>
  <button onclick="showTab('monthly')">📅 月別</button>
  <button onclick="showTab('breakdown')">🏠 内訳</button>
  <button onclick="showTab('records')">📋 記録一覧</button>
  <button class="active" onclick="showTab('input')">✏️ 新規入力</button>
</nav>

<div class="main">

  <!-- DASHBOARD -->
  <div id="tab-dashboard" class="tab-content">
    <div class="stat-grid" id="stat-grid"></div>
    <div class="chart-card">
      <h3>累計収支の推移</h3>
      <div class="chart-wrap" style="height:260px">
        <canvas id="chart-cumulative"></canvas>
      </div>
    </div>
    <div class="two-col">
      <div class="chart-card">
        <h3>月別損益</h3>
        <div class="chart-wrap" style="height:220px">
          <canvas id="chart-monthly-bar"></canvas>
        </div>
      </div>
      <div class="chart-card">
        <h3>場所別収支</h3>
        <div class="chart-wrap" style="height:220px">
          <canvas id="chart-location"></canvas>
        </div>
      </div>
    </div>
  </div>

  <!-- CHART -->
  <div id="tab-chart" class="tab-content">
    <div class="year-tabs" id="year-tabs-chart"></div>
    <div class="chart-card">
      <h3>累計収支の推移（詳細）</h3>
      <div class="chart-wrap" style="height:320px">
        <canvas id="chart-cumulative-detail"></canvas>
      </div>
    </div>
    <div class="chart-card">
      <h3>月別損益（棒グラフ）</h3>
      <div class="chart-wrap" style="height:280px">
        <canvas id="chart-monthly-detail"></canvas>
      </div>
    </div>
    <div class="two-col">
      <div class="chart-card">
        <h3>レート別収支</h3>
        <div class="chart-wrap" style="height:260px">
          <canvas id="chart-rate-doughnut"></canvas>
        </div>
      </div>

// ===================== UTILS =====================
function fmt(n) {
  if (n == null) return '—';
  const abs = Math.abs(n);
  const s = abs >= 10000
    ? (n < 0 ? '−' : '+') + '¥' + Math.abs(n).toLocaleString()
    : (n < 0 ? '−' : '+') + '¥' + Math.abs(n).toLocaleString();
  return (n < 0 ? '−' : '+') + '¥' + Math.abs(n).toLocaleString();
}
function fmtPlain(n) {
  if (n == null) return '—';
  return (n < 0 ? '−' : '') + '¥' + Math.abs(n).toLocaleString();
}
function fmtDate(s) {
  if (!s) return '—';
  return s.replace(/-/g, '/');
}
function getYearMonth(s) { return s.slice(0,7); }
function getYear(s) { return s.slice(0,4); }
function groupBy(arr, fn) {
  return arr.reduce((m, x) => {
    const k = fn(x);
    if (!m[k]) m[k] = [];
    m[k].push(x);
    return m;
  }, {});
}

function getBadgeClass(rate) {
  const map = {'3a':'badge-3a','3b':'badge-3b','4a':'badge-4a','4b':'badge-4b','ピン東':'badge-pin','2.0③':'badge-2','2.0④':'badge-2'};
  return map[rate] || 'badge-other';
}

// ===================== INIT =====================
function init() {
  initBreakdownFilters();
  // Header
  const total = RAW_DATA[RAW_DATA.length - 1]?.cumulative || 0;
  const el = document.getElementById('header-total');
  el.textContent = fmtPlain(total);
  el.className = 'amount ' + (total < 0 ? 'negative' : '');
  document.getElementById('header-sub').textContent =
    `${RAW_DATA.length}件 | ${RAW_DATA[0]?.date} 〜 ${RAW_DATA[RAW_DATA.length-1]?.date}`;

  buildStatCards();
  buildDashboardCharts();
  buildFilters();
  buildBreakdowns();
  buildYearTabs();
  renderTable();
}

// ===================== STAT CARDS =====================
function buildStatCards() {
  const d = RAW_DATA;
  const total = d[d.length-1]?.cumulative || 0;
  const wins = d.filter(x => x.profit > 0);
  const losses = d.filter(x => x.profit < 0);
  const winRate = (wins.length / d.length * 100).toFixed(1);
  const maxWin = Math.max(...d.map(x => x.profit));
  const maxLoss = Math.min(...d.map(x => x.profit));
  const avg = Math.round(d.reduce((s,x) => s + x.profit, 0) / d.length);

  // Current year stats
  const thisYear = new Date().getFullYear().toString();
  const thisYearData = d.filter(x => x.date.startsWith(thisYear));
  const thisYearTotal = thisYearData.reduce((s,x) => s+x.profit, 0);

  const cards = [
    { label: '累計収支', value: fmtPlain(total), cls: total>=0?'gold':'lose' },
    { label: '対局数', value: d.length.toLocaleString() + '回', cls: '' },
    { label: '勝率', value: winRate + '%', sub: `${wins.length}勝 ${losses.length}敗`, cls: 'gold' },
    { label: '1試合平均', value: fmt(avg), cls: avg>=0?'win':'lose' },
    { label: '最高勝ち', value: fmt(maxWin), cls: 'win' },
    { label: '最大負け', value: fmt(maxLoss), cls: 'lose' },
    { label: `${thisYear}年収支`, value: fmtPlain(thisYearTotal), cls: thisYearTotal>=0?'win':'lose', sub: `${thisYearData.length}回` },
    { label: '記録期間', value: `${Math.round((new Date(d[d.length-1].date)-new Date(d[0].date))/(1000*60*60*24*365.25)*10)/10}年`, cls: 'gold' },
  ];

  document.getElementById('stat-grid').innerHTML = cards.map(c => `
    <div class="stat-card">
      <div class="label">${c.label}</div>
      <div class="value ${c.cls}">${c.value}</div>
      ${c.sub ? `<div class="sub">${c.sub}</div>` : ''}
    </div>
  `).join('');
}

// ===================== CHARTS =====================
function destroyChart(id) {
  if (charts[id]) { charts[id].destroy(); delete charts[id]; }
}

const CHART_DEFAULTS = {
  responsive: true,
  maintainAspectRatio: false,
  plugins: { legend: { display: false } },
  scales: {
    x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#6a9a72', font: { size: 10 } } },
    y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#6a9a72', font: { size: 10 } } }
  }
};

function buildDashboardCharts() {
  // Cumulative line
  destroyChart('cum');
  const d = RAW_DATA;
  // Sample every N points for performance
  const step = Math.max(1, Math.floor(d.length / 200));
  const sampled = d.filter((_, i) => i % step === 0 || i === d.length - 1);
  charts['cum'] = new Chart(document.getElementById('chart-cumulative'), {
    type: 'line',
    data: {
      labels: sampled.map(x => x.date),
      datasets: [{
        data: sampled.map(x => x.cumulative),
        borderColor: '#e8b84b',
        borderWidth: 2,
        pointRadius: 0,
        fill: true,
        backgroundColor: 'rgba(232,184,75,0.08)',
        tension: 0.3
      }]
    },
    options: {
      ...CHART_DEFAULTS,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => '累計: ' + fmtPlain(ctx.parsed.y)
          }
        }
      }
    }
  });

  // Monthly bar
  destroyChart('mbar');
  const byMonth = groupBy(d, x => getYearMonth(x.date));
  const months = Object.keys(byMonth).sort().slice(-24);
  const monthTotals = months.map(m => byMonth[m].reduce((s,x) => s+x.profit, 0));
  charts['mbar'] = new Chart(document.getElementById('chart-monthly-bar'), {
    type: 'bar',
    data: {
      labels: months.map(m => m.slice(2)),
      datasets: [{
        data: monthTotals,
        backgroundColor: monthTotals.map(v => v >= 0 ? 'rgba(76,175,80,0.7)' : 'rgba(239,83,80,0.7)'),
        borderRadius: 4
      }]
    },
    options: {
      ...CHART_DEFAULTS,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => fmtPlain(ctx.parsed.y) } }
      }
    }
  });

  // Location doughnut
  destroyChart('loc');
  const byLoc = groupBy(d, x => x.location || 'その他');
  const locKeys = Object.keys(byLoc).sort((a,b) => byLoc[b].length - byLoc[a].length).slice(0,8);
  const locTotals = locKeys.map(k => byLoc[k].reduce((s,x) => s+x.profit, 0));
  const COLORS = ['#e8b84b','#4caf50','#2196f3','#9c27b0','#ff5722','#00bcd4','#8bc34a','#f44336'];
  charts['loc'] = new Chart(document.getElementById('chart-location'), {
    type: 'doughnut',
    data: {
      labels: locKeys,
      datasets: [{
        data: locTotals.map(Math.abs),
        backgroundColor: COLORS,
        borderColor: '#1a3d28',
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: true, position: 'right', labels: { color: '#a8c8a0', font: { size: 10 }, boxWidth: 12 } },
        tooltip: { callbacks: { label: ctx => ctx.label + ': ' + fmtPlain(locTotals[ctx.dataIndex]) } }
      }
    }
  });
}

let bdFilterData = null; // null = use RAW_DATA

function initBreakdownFilters() {
  const locs = [...new Set(RAW_DATA.map(x => x.location).filter(Boolean))].sort();
  const rates = [...new Set(RAW_DATA.map(x => x.rate).filter(Boolean))].sort();

  const el_to = document.getElementById('bd-date-to');
  if (!el_from.value) el_from.value = RAW_DATA[0].date;
  if (!el_to.value) el_to.value = RAW_DATA[RAW_DATA.length-1].date;
}

function applyBreakdownFilters() {
  const from = document.getElementById('bd-date-from').value;
  const to = document.getElementById('bd-date-to').value;
  const loc = document.getElementById('bd-location').value;
  const rate = document.getElementById('bd-rate').value;
  const result = document.getElementById('bd-result').value;
  bdFilterData = RAW_DATA.filter(x => {
    if (from && x.date < from) return false;
    if (to && x.date > to) return false;
    if (loc && x.location !== loc) return false;
    if (rate && x.rate !== rate) return false;
    if (result === 'win' && x.profit <= 0) return false;
    if (result === 'lose' && x.profit >= 0) return false;
    return true;
  });
  buildBreakdowns();
}

function resetBreakdownFilters() {
  bdFilterData = null;
  document.getElementById('bd-location').value = '';
  document.getElementById('bd-rate').value = '';
  document.getElementById('bd-result').value = '';
  document.getElementById('bd-date-from').value = RAW_DATA[0].date;
  document.getElementById('bd-date-to').value = RAW_DATA[RAW_DATA.length-1].date;
  buildBreakdowns();
}

function buildBreakdowns() {
  const d = bdFilterData || RAW_DATA;
  if (!d.length) {
    ['breakdown-location','breakdown-rate','breakdown-year'].forEach(id => {
      document.getElementById(id).innerHTML = '<tr><td colspan="4" style="color:var(--text3);text-align:center;padding:16px">データなし</td></tr>';
    });
    return;
  }

  // Location
  const byLoc = groupBy(d, x => x.location || 'その他');
  const locKeys = Object.keys(byLoc).sort((a,b) => byLoc[b].reduce((s,x)=>s+x.profit,0) - byLoc[a].reduce((s,x)=>s+x.profit,0));
  const maxAbsLoc = Math.max(...locKeys.map(k => Math.abs(byLoc[k].reduce((s,x)=>s+x.profit,0)))) || 1;
  document.getElementById('breakdown-location').innerHTML = locKeys.map(k => {
    const total = byLoc[k].reduce((s,x)=>s+x.profit,0);
    const pct = Math.abs(total) / maxAbsLoc * 100;
    return `<tr>
      <td>${k}</td>
      <td>${byLoc[k].length}</td>
      <td style="color:${total>=0?'#4caf50':'#ef5350'}">
        ${fmtPlain(total)}
        <div class="bar-bg"><div class="bar-fill ${total<0?'negative':''}" style="width:${pct}%"></div></div>
      </td>
    </tr>`;
  }).join('');

  // Rate
  const byRate = groupBy(d, x => x.rate || '?');
  const rateKeys = Object.keys(byRate).sort((a,b) => byRate[b].reduce((s,x)=>s+x.profit,0) - byRate[a].reduce((s,x)=>s+x.profit,0));
  const maxAbsRate = Math.max(...rateKeys.map(k => Math.abs(byRate[k].reduce((s,x)=>s+x.profit,0)))) || 1;
  document.getElementById('breakdown-rate').innerHTML = rateKeys.map(k => {
    const total = byRate[k].reduce((s,x)=>s+x.profit,0);
    const pct = Math.abs(total) / maxAbsRate * 100;
    return `<tr>
      <td><span class="badge ${getBadgeClass(k)}">${k}</span></td>
      <td>${byRate[k].length}</td>
      <td style="color:${total>=0?'#4caf50':'#ef5350'}">
        ${fmtPlain(total)}
        <div class="bar-bg"><div class="bar-fill ${total<0?'negative':''}" style="width:${pct}%"></div></div>
      </td>
    </tr>`;
  }).join('');

  // Year (with max/min)
  const byYear = groupBy(d, x => getYear(x.date));
  const yearKeys = Object.keys(byYear).sort().reverse();
  document.getElementById('breakdown-year').innerHTML = yearKeys.map(y => {
    const records = byYear[y];
    const total = records.reduce((s,x)=>s+x.profit,0);
    const avg = Math.round(total / records.length);
    const best = Math.max(...records.map(x=>x.profit));
    const worst = Math.min(...records.map(x=>x.profit));
    return `<tr>
      <td>${y}年</td>
      <td>${records.length}</td>
      <td style="color:${total>=0?'#4caf50':'#ef5350'}">${fmtPlain(total)}</td>
      <td style="color:${avg>=0?'#81c784':'#ef9a9a'}">${fmtPlain(avg)}</td>
      <td style="color:#81c784">${fmt(best)}</td>
      <td style="color:#ef9a9a">${fmt(worst)}</td>
    </tr>`;
  }).join('');
}

// ===================== TABLE =====================
function sortTable(key) {
  if (sortKey === key) { sortDir *= -1; }
  else { sortKey = key; sortDir = -1; }
  currentPage = 1;
  renderTable();
}

function renderTable() {
  const sorted = [...filteredData].sort((a,b) => {
    const va = a[sortKey] ?? -Infinity;
    const vb = b[sortKey] ?? -Infinity;
    return (va < vb ? -1 : va > vb ? 1 : 0) * sortDir;
  });

  document.getElementById('record-count').textContent = `${filteredData.length}件`;

  // Update sort icons
  document.querySelectorAll('thead th').forEach(th => {
    th.classList.remove('sorted');
    const icon = th.querySelector('.sort-icon');
    if (icon) icon.textContent = '↕';
  });

  const totalPages = Math.ceil(sorted.length / PAGE_SIZE);
  const start = (currentPage - 1) * PAGE_SIZE;
  const pageData = sorted.slice(start, start + PAGE_SIZE);

  document.getElementById('records-tbody').innerHTML = pageData.map(r => `
    <tr>
      <td style="color:var(--text3)">${r.id ?? ''}</td>
      <td>${fmtDate(r.date)}</td>
      <td class="td-profit ${r.profit >= 0 ? 'positive' : 'negative'}">${fmt(r.profit)}</td>
      <td style="color:var(--text3)">¥${(r.fee||0).toLocaleString()}</td>
      <td><span class="badge ${getBadgeClass(r.rate)}">${r.rate}</span></td>
      <td>${r.location}</td>
      <td class="td-cumulative ${r.cumulative >= 0 ? 'positive' : 'negative'}">${fmtPlain(r.cumulative)}</td>
      <td class="notes-cell" title="${r.notes}">${r.notes}</td>
      <td><button class="del-btn" style="color:var(--text3);border-color:var(--border)" onclick="showModal(${r.id})">詳細/編集</button></td>
    </tr>
  `).join('');

  renderPagination(totalPages);
}

function renderPagination(total) {
  if (total <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
  let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;

  const pages = [];
  for (let p = 1; p <= total; p++) {
    if (p === 1 || p === total || (p >= currentPage-2 && p <= currentPage+2)) pages.push(p);
    else if (pages[pages.length-1] !== '…') pages.push('…');
  }

  pages.forEach(p => {
    if (p === '…') html += `<span style="color:var(--text3);padding:0 4px">…</span>`;
    else html += `<button class="page-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
  });

  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===total?'disabled':''}>›</button>`;
  document.getElementById('pagination').innerHTML = html;
}

function goPage(p) {
  const total = Math.ceil(filteredData.length / PAGE_SIZE);
  if (p < 1 || p > total) return;
  currentPage = p;
  renderTable();
  document.querySelector('.table-wrap').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

const EDIT_KEY = 'mahjong_edits_v1';
let editingId = null;

function loadEdits() {
  try { return JSON.parse(localStorage.getItem(EDIT_KEY) || '{}'); }
  catch { return {}; }
}

function saveEdits(edits) {
  localStorage.setItem(EDIT_KEY, JSON.stringify(edits));
}

// Apply stored edits to RAW_DATA on startup
(function applyStoredEdits() {
  const edits = loadEdits();
  Object.entries(edits).forEach(([idStr, patch]) => {
    const id = Number(idStr);
    const r = RAW_DATA.find(x => x.id === id);
    if (r) Object.assign(r, patch);
  });
  // Recompute cumulative after any edits
  RAW_DATA.sort((a,b) => a.date < b.date ? -1 : a.date > b.date ? 1 : 0);
  let cum = 0;
  RAW_DATA.forEach(r => { cum += r.profit; r.cumulative = cum; });
})();

function showModal(id) {

function switchToViewMode() {
  document.getElementById('modal-view').style.display = 'block';
  document.getElementById('modal-edit').style.display = 'none';
}

function saveEdit() {
  const date = document.getElementById('edit-date').value;
  const profitStr = document.getElementById('edit-profit').value;
  if (!date || !profitStr) { showToast('日付と収支は必須です', true); return; }

  const patch = {
    date,
    profit: parseInt(profitStr),
    fee: parseInt(document.getElementById('edit-fee').value) || 0,
    rate: document.getElementById('edit-rate').value.trim(),
    location: document.getElementById('edit-location').value.trim(),
    notes: document.getElementById('edit-notes').value.trim(),
  };

  // Apply to RAW_DATA
  const r = RAW_DATA.find(x => x.id === editingId);
  if (r) Object.assign(r, patch);

  // Persist edit
  if (r && r._newId) {
    // It's a new entry — update in newEntries localStorage
    const stored = loadNewEntries();
    const idx = stored.findIndex(e => e._newId === r._newId);
    if (idx !== -1) { Object.assign(stored[idx], patch); saveNewEntries(stored); }
  } else {
    // Original entry — store override
    const edits = loadEdits();
    edits[editingId] = patch;
    saveEdits(edits);
  }

  // Recompute cumulative
  RAW_DATA.sort((a,b) => a.date < b.date ? -1 : a.date > b.date ? 1 : 0);
  let cum = 0;
  RAW_DATA.forEach(row => { cum += row.profit; row.cumulative = cum; });
  filteredData = [...RAW_DATA];

  // Refresh UI
  buildStatCards();
  buildDashboardCharts();
  buildBreakdowns();
  renderTable();
  renderNewEntriesTable();

  document.getElementById('modal').classList.remove('show');
  showToast('✓ 編集を保存しました');
}

  if (e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('show');

}

const STORAGE_KEY = 'mahjong_new_entries_v1';

function loadNewEntries() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch { return []; }
}

function saveNewEntries(entries) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
}

// Merge new entries into RAW_DATA on startup
(function mergeStoredEntries() {
  const stored = loadNewEntries();
  if (!stored.length) return;
  const maxId = Math.max(...RAW_DATA.map(x => x.id || 0));
  stored.forEach((e, i) => {
    if (!RAW_DATA.find(x => x._newId === e._newId)) {
      // compute cumulative from last RAW_DATA entry
      const lastCum = RAW_DATA[RAW_DATA.length-1]?.cumulative || 0;
      // Insert in date order
      const entryWithId = { ...e, id: maxId + i + 1 };
      RAW_DATA.push(entryWithId);
    }
  });
  // Re-sort RAW_DATA by date
  RAW_DATA.sort((a, b) => a.date < b.date ? -1 : a.date > b.date ? 1 : 0);
  // Recompute cumulative
  let cum = 0;
  RAW_DATA.forEach(r => { cum += r.profit; r.cumulative = cum; });
})();

function submitEntry() {
  const date = document.getElementById('in-date').value;
  const profitStr = document.getElementById('in-profit').value;
  if (!date) { showToast('日付を入力してください', true); return; }
  if (!profitStr) { showToast('収支を入力してください', true); return; }

  const profit = parseInt(profitStr);
  const fee = parseInt(document.getElementById('in-fee').value) || 0;
  const rateSel = document.getElementById('in-rate').value;
  const rateCustom = document.getElementById('in-rate-custom').value.trim();
  const rate = rateSel === 'カスタム' ? rateCustom : rateSel;
  if (!rate) { showToast('レートを入力してください', true); return; }
  const locSel = document.getElementById('in-location').value;
  const locCustom = document.getElementById('in-location-custom').value.trim();
  const location = locSel === 'カスタム' ? locCustom : locSel;
  if (!location) { showToast('場所を入力してください', true); return; }

  // Save new custom values for future use
  if (rateSel === 'カスタム' && rateCustom) saveCustomValue('rates', rateCustom);
  if (locSel === 'カスタム' && locCustom) saveCustomValue('locations', locCustom);

  // Add to localStorage
  const stored = loadNewEntries();
  stored.push(entry);
  saveNewEntries(stored);

  // Add to RAW_DATA and resort
  const maxId = Math.max(...RAW_DATA.map(x => x.id || 0));
  RAW_DATA.push({ ...entry, id: maxId + 1 });
  RAW_DATA.sort((a,b) => a.date < b.date ? -1 : a.date > b.date ? 1 : 0);
  let cum = 0;
  RAW_DATA.forEach(r => { cum += r.profit; r.cumulative = cum; });

  // Update filteredData
  filteredData = [...RAW_DATA];

  // Reset form
  document.getElementById('in-profit').value = '';
  document.getElementById('in-fee').value = '0';
  document.getElementById('in-notes').value = '';
  document.getElementById('in-date').value = new Date().toISOString().slice(0,10);
  document.getElementById('in-rate').value = '3a';
  document.getElementById('in-rate-custom').value = '';
  document.getElementById('in-location-custom').value = '';
  rebuildCustomDropdowns();
  updatePreview();

  // Refresh UI
  buildStatCards();
  buildDashboardCharts();
  buildBreakdowns();
  initBreakdownFilters();
  buildFilters();
  buildYearTabs();
  renderNewEntriesTable();
  renderTable();
  showToast('✓ 保存しました！');
}

function renderNewEntriesTable() {
  const stored = loadNewEntries();
  const container = document.getElementById('new-entries-container');
  if (!stored.length) {
    container.innerHTML = '<div class="empty-state">まだ新しい記録はありません</div>';
    return;
  }

  const rows = [...stored].reverse().map(e => `
    <tr>
      <td>${e.date.replace(/-/g,'/')}</td>
      <td style="color:${e.profit>=0?'#4caf50':'#ef5350'};font-weight:600">${fmt(e.profit)}</td>
      <td style="color:var(--text3)">¥${(e.fee||0).toLocaleString()}</td>
      <td><span class="badge ${getBadgeClass(e.rate)}">${e.rate}</span></td>
      <td>${e.location}</td>
      <td style="color:var(--text3);font-size:0.75rem;max-width:120px;overflow:hidden;text-overflow:ellipsis">${e.notes||''}</td>
        <td style="display:flex;gap:4px">
        <button class="del-btn" style="color:var(--text3);border-color:var(--border)" onclick="editNewEntry('${e._newId}')">編集</button>
        <button class="del-btn" onclick="deleteEntry('${e._newId}')">削除</button>
      </td>
    </tr>
  `).join('');

  container.innerHTML = `
    <div class="table-scroll">
      <table class="new-entries-table">
        <thead><tr>
          <th>日付</th><th>収支</th><th>場代</th><th>レート</th><th>場所</th><th>メモ</th><th></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

function deleteEntry(newId) {
  let stored = loadNewEntries();
  stored = stored.filter(e => e._newId !== newId);
  saveNewEntries(stored);

  // Rebuild RAW_DATA from scratch then re-merge
  // Remove the entry from RAW_DATA
  const idx = RAW_DATA.findIndex(x => x._newId === newId);
  if (idx !== -1) RAW_DATA.splice(idx, 1);
  let cum = 0;
  RAW_DATA.forEach(r => { cum += r.profit; r.cumulative = cum; });
  filteredData = [...RAW_DATA];

  buildStatCards();
  renderNewEntriesTable();
  renderTable();
  showToast('削除しました');
}

function clearNewEntries() {
  if (!loadNewEntries().length) return;
  if (!confirm('追加した記録をすべて削除しますか？')) return;
  const stored = loadNewEntries();
  stored.forEach(e => {
    const idx = RAW_DATA.findIndex(x => x._newId === e._newId);
    if (idx !== -1) RAW_DATA.splice(idx, 1);
  });
  saveNewEntries([]);
  let cum = 0;
  RAW_DATA.forEach(r => { cum += r.profit; r.cumulative = cum; });
  filteredData = [...RAW_DATA];
  buildStatCards();
  renderNewEntriesTable();
  renderTable();
  showToast('全削除しました');
}

function exportCSV() {
  const header = ['#','日付','収支','場代','レート','場所','累計','メモ'];
  const rows = RAW_DATA.map((r,i) => [
    i+1, r.date, r.profit, r.fee||0, r.rate, r.location, r.cumulative, r.notes||''
  ]);
  const csv = [header, ...rows].map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '麻雀成績_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  showToast('CSVをダウンロードしました');
}

function exportHTML() {
  // Build updated HTML with new data baked in
  const jsonData = JSON.stringify(RAW_DATA.map(({_newId, ...r}) => r));
  const currentHTML = document.documentElement.outerHTML;
  // Replace the RAW_DATA constant
  const marker = 'const RAW_DATA =';
  const start = currentHTML.indexOf(marker);
  const afterMarker = currentHTML.indexOf(';', start + marker.length + 1000);
  if (start === -1 || afterMarker === -1) { showToast('エクスポートに失敗しました', true); return; }
  const newHTML = currentHTML.slice(0, start + marker.length) + '\n' + jsonData + currentHTML.slice(afterMarker);
  const blob = new Blob([newHTML], { type: 'text/html;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '麻雀集計_' + new Date().toISOString().slice(0,10) + '.html';
  a.click();
  showToast('HTMLを保存しました（新データ込み）');
}

// ===================== CUSTOM VALUES =====================
const CUSTOM_KEY = 'mahjong_custom_values_v1';

function loadCustomValues() {
  try { return JSON.parse(localStorage.getItem(CUSTOM_KEY) || '{"rates":[],"locations":[]}'); }
  catch { return { rates: [], locations: [] }; }
}

function saveCustomValue(type, value) {
  const data = loadCustomValues();
  if (!data[type].includes(value)) {
    data[type].unshift(value); // newest first
    localStorage.setItem(CUSTOM_KEY, JSON.stringify(data));
  }
}

function deleteCustomValue(type, value) {
  const data = loadCustomValues();
  data[type] = data[type].filter(v => v !== value);
  localStorage.setItem(CUSTOM_KEY, JSON.stringify(data));
  rebuildCustomDropdowns();
}

function rebuildCustomDropdowns() {
  const data = loadCustomValues();

  // Rate dropdown — insert custom values before the カスタム option
  const rateSel = document.getElementById('in-rate');
  const currentRate = rateSel.value;
  // Remove previously injected custom options
  Array.from(rateSel.options).forEach(o => { if (o.dataset.custom) o.remove(); });
  const rateCustomOpt = rateSel.querySelector('[value="カスタム"]');
  data.rates.forEach(v => {
    const o = new Option(v, v);
    o.dataset.custom = '1';
    rateSel.insertBefore(o, rateCustomOpt);
  });
  if (Array.from(rateSel.options).find(o => o.value === currentRate)) {
    rateSel.value = currentRate;
  }

  // Location dropdown — insert before カスタム option
  const locSel = document.getElementById('in-location');
  const currentLoc = locSel.value;
  Array.from(locSel.options).forEach(o => { if (o.dataset.custom) o.remove(); });
  const locCustomOpt = locSel.querySelector('[value="カスタム"]');
  data.locations.forEach(v => {
    const o = new Option(v, v);
    o.dataset.custom = '1';
    locSel.insertBefore(o, locCustomOpt);
  });
  if (Array.from(locSel.options).find(o => o.value === currentLoc)) {
    locSel.value = currentLoc;
  }

  // Also update the manage panel if visible
  renderCustomValueManager();
}

function renderCustomValueManager() {
  const el = document.getElementById('custom-value-manager');
  if (!el) return;
  const data = loadCustomValues();

  const section = (type, label, items) => items.length === 0 ? '' : `
    <div style="margin-bottom:14px">
      <div style="font-size:0.73rem;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">${label}</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        ${items.map(v => `
          <span style="display:inline-flex;align-items:center;gap:5px;background:var(--bg3);border:1px solid var(--border);padding:4px 10px;border-radius:20px;font-size:0.8rem;color:var(--text2)">
            ${v}
            <button onclick="deleteCustomValue('${type}','${v.replace(/'/g,"\\'")}');rebuildCustomDropdowns()" style="background:none;border:none;color:#ef9a9a;cursor:pointer;font-size:0.85rem;padding:0;line-height:1">×</button>
          </span>
        `).join('')}
      </div>
    </div>
  `;

  el.innerHTML = (data.rates.length + data.locations.length === 0)
    ? '<div style="color:var(--text3);font-size:0.82rem">カスタム値はまだありません</div>'
    : section('rates', '追加したレート', data.rates) + section('locations', '追加した場所', data.locations);
}

function editNewEntry(newId) {
  const r = RAW_DATA.find(x => x._newId === newId);
  if (r) showModal(r.id);
}

function showToast(msg, isError=false) {
  let t = document.getElementById('_toast');
  if (!t) {
    t = document.createElement('div');
    t.id = '_toast';
    t.className = 'toast';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  setTimeout(() => t.classList.add('show'), 10);
  setTimeout(() => t.classList.remove('show'), 2500);
}


// ===================== START =====================
// Set today as default date
document.getElementById("in-date").value = new Date().toISOString().slice(0,10);
rebuildCustomDropdowns();
updatePreview();
renderNewEntriesTable();
init();
</script>
